name: 'Pull Request'
on:
  pull_request:

jobs:
  golang:
    runs-on: 'ubuntu-latest'
    steps:
      - id: 'checkout'
        uses: 'actions/checkout@v5'
      - id: 'setup-go'
        uses: 'actions/setup-go@v6'
        with:
          go-version: '1.25'
      - id: 'fetch-modules'
        run: 'go mod download'
      - id: 'go-build'
        run: 'go build ./...'
      - id: 'go-test'
        run: 'go test -v ./...'
